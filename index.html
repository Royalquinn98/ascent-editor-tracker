<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ascent Digital Creation - Editor Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--card:#1a1a26;--card2:#222233;--gold:#f0b429;--blue:#4da6ff;--green:#34d399;--red:#f87171;--purple:#a78bfa;--orange:#fb923c;--cyan:#22d3ee;--txt:#f0f0f5;--txt2:#8888a0;--muted:#55556a;--border:#2a2a3a;--R:14px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(240,180,41,.06)0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(77,166,255,.04)0%,transparent 50%);pointer-events:none;z-index:0}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.ld-ov{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .4s}
.ld-ov.hid{opacity:0;pointer-events:none}
.ld-sp{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-tx{margin-top:16px;font-size:13px;color:var(--txt2)}

.sync{position:fixed;top:8px;right:8px;z-index:200;font-size:10px;padding:4px 10px;border-radius:20px;backdrop-filter:blur(10px);transition:.3s;pointer-events:none}
.sync.ok{background:rgba(52,211,153,.15);color:var(--green)}
.sync.ing{background:rgba(240,180,41,.15);color:var(--gold)}
.sync.off{background:rgba(248,113,113,.15);color:var(--red)}

.hdr{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.bicon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--orange));border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#0a0a0f;box-shadow:0 0 20px rgba(240,180,41,.25)}
.btxt h1{font-size:15px;font-weight:700;letter-spacing:.5px;background:linear-gradient(90deg,var(--gold),var(--txt));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btxt span{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:12px}
.abadge{font-size:10px;padding:4px 10px;background:rgba(240,180,41,.12);color:var(--gold);border-radius:20px;font-weight:600;letter-spacing:1px;text-transform:uppercase}

.lscr{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1}
.lcard{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.4);text-align:center;animation:fu .6s ease}
@keyframes fu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lcard .bicon{width:56px;height:56px;font-size:26px;margin:0 auto 16px}
.lcard h2{font-size:22px;font-weight:700;margin-bottom:4px}
.lcard .sub{font-size:13px;color:var(--txt2);margin-bottom:28px}
.pgrp{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
.pbox{width:52px;height:58px;background:var(--bg);border:2px solid var(--border);border-radius:12px;color:var(--txt);font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;text-align:center;outline:none;transition:.3s}
.pbox:focus{border-color:var(--gold);box-shadow:0 0 16px rgba(240,180,41,.15)}
.lbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),var(--orange));border:none;border-radius:12px;color:#0a0a0f;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:.3s}
.lbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(240,180,41,.3)}
.lerr{color:var(--red);font-size:12px;margin-top:12px;min-height:18px}

.tabs{display:flex;gap:4px;padding:16px 24px 0;overflow-x:auto;position:relative;z-index:1}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--txt2);background:transparent;border:none;border-radius:10px 10px 0 0;cursor:pointer;white-space:nowrap;transition:.25s;font-family:'Outfit',sans-serif;position:relative}
.tab:hover{color:var(--txt);background:rgba(255,255,255,.03)}
.tab.on{color:var(--gold);background:var(--card)}
.tab.on::after{content:'';position:absolute;bottom:0;left:20%;width:60%;height:2px;background:var(--gold);border-radius:2px}

.main{padding:20px 24px 100px;position:relative;z-index:1;max-width:1200px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:24px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:18px;transition:.3s}
.sc:hover{border-color:rgba(240,180,41,.3);transform:translateY(-2px)}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.sv{font-size:28px;font-weight:800;font-family:'JetBrains Mono',monospace}
.sv.gd{color:var(--gold)}.sv.bl{color:var(--blue)}.sv.gr{color:var(--green)}.sv.pr{color:var(--purple)}.sv.rd{color:var(--red)}
.ss{font-size:11px;color:var(--txt2);margin-top:4px}
.st{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}

/* Project cards */
.plist{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:18px;transition:.3s}
.pcard:hover{border-color:rgba(255,255,255,.08)}
.pcard.overdue-blink{animation:oblink 1.2s ease-in-out infinite;border-color:var(--red)}
@keyframes oblink{0%,100%{border-color:var(--red);box-shadow:0 0 0 rgba(248,113,113,0)}50%{border-color:var(--red);box-shadow:0 0 20px rgba(248,113,113,.25)}}
.pcard-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.pcard-title{font-size:15px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pcard-badge{font-size:10px;padding:3px 10px;border-radius:20px;font-weight:600;letter-spacing:.5px;flex-shrink:0}
.pcard-badge.pending{background:rgba(251,146,60,.12);color:var(--orange)}
.pcard-badge.in-progress{background:rgba(77,166,255,.12);color:var(--blue)}
.pcard-badge.exported{background:rgba(52,211,153,.12);color:var(--green)}
.pcard-badge.overdue{background:rgba(248,113,113,.15);color:var(--red)}

.pcard-meta{display:flex;flex-wrap:wrap;gap:12px;font-size:11px;color:var(--txt2);margin-bottom:14px}
.pcard-meta b{color:var(--txt);font-weight:600}

/* Character chips */
.chars-area{margin-bottom:14px}
.chars-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:.2s;border:1px solid transparent;user-select:none}
.chip.vo-yes{background:rgba(52,211,153,.12);color:var(--green);border-color:rgba(52,211,153,.3)}
.chip.vo-no{background:rgba(248,113,113,.1);color:var(--red);border-color:rgba(248,113,113,.25)}
.chip .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.chip.vo-yes .dot{background:var(--green);box-shadow:0 0 6px rgba(52,211,153,.5)}
.chip.vo-no .dot{background:var(--red);box-shadow:0 0 6px rgba(248,113,113,.5)}

/* Pending voiceover summary */
.vo-pending{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.15);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:var(--red)}
.vo-pending b{font-weight:700}

/* Deadline row */
.dl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.dl-tag{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500}
.dl-tag.urgent{background:rgba(248,113,113,.12);color:var(--red)}
.dl-tag.normal{background:rgba(77,166,255,.1);color:var(--blue)}
.dl-tag.safe{background:rgba(52,211,153,.1);color:var(--green)}
.dl-tag.done{background:rgba(52,211,153,.12);color:var(--green)}

/* Action buttons */
.pcard-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.abtn{padding:7px 16px;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;font-family:'Outfit',sans-serif;transition:.2s;border:none}
.abtn-green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.abtn-green:hover{background:rgba(52,211,153,.2)}
.abtn-blue{background:rgba(77,166,255,.1);color:var(--blue);border:1px solid rgba(77,166,255,.25)}
.abtn-blue:hover{background:rgba(77,166,255,.18)}
.abtn-gold{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.abtn-gold:hover{background:rgba(240,180,41,.2)}

/* Leaderboard */
.lb{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
.lr{background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:14px 18px;display:flex;align-items:center;gap:14px;transition:.3s;overflow:hidden}
.lr.r1{border-color:rgba(240,180,41,.35);background:linear-gradient(135deg,rgba(240,180,41,.08),var(--card))}
.lr.r2{border-color:rgba(192,192,192,.25);background:linear-gradient(135deg,rgba(192,192,192,.05),var(--card))}
.lr.r3{border-color:rgba(205,127,50,.25);background:linear-gradient(135deg,rgba(205,127,50,.05),var(--card))}
.lr.hl{border-color:rgba(77,166,255,.4);box-shadow:0 0 20px rgba(77,166,255,.08)}
.rb{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;flex-shrink:0}
.r1 .rb{background:linear-gradient(135deg,#f0b429,#f59e0b);color:#0a0a0f}
.r2 .rb{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#0a0a0f}
.r3 .rb{background:linear-gradient(135deg,#cd7f32,#b8722e);color:#0a0a0f}
.rb.df{background:var(--bg);border:1px solid var(--border);color:var(--txt2)}
.la{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;flex-shrink:0}
.li{flex:1;min-width:0}
.ln{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.ls{font-size:11px;color:var(--txt2);margin-top:2px}
.lp{text-align:right;flex-shrink:0}
.lpv{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:700;color:var(--gold)}
.lpl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}

.eotm{background:linear-gradient(135deg,rgba(240,180,41,.1),rgba(251,146,60,.05));border:1px solid rgba(240,180,41,.25);border-radius:18px;padding:28px;text-align:center;margin-bottom:28px;position:relative;overflow:hidden}
.eotm::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(240,180,41,.12),transparent 70%);pointer-events:none}

/* Admin forms */
.asec{background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:20px;margin-bottom:16px}
.asec h3{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--gold)}
.fr{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.fi{flex:1;min-width:130px;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:.2s}
.fi:focus{border-color:var(--gold)}
.fi::placeholder{color:var(--muted)}
select.fi{cursor:pointer}
.fi-full{width:100%;flex:none}
.fi-hint{font-size:10px;color:var(--muted);margin-top:-6px;margin-bottom:8px;padding-left:4px}

.btn{padding:10px 20px;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:.25s}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--orange));color:#0a0a0f}
.btn-g:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,.3)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--txt2)}
.btn-o:hover{border-color:var(--txt2);color:var(--txt)}
.btn-r{background:rgba(248,113,113,.12);color:var(--red);border:none;padding:10px 20px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-r:hover{background:rgba(248,113,113,.2)}

.el{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.el:last-child{border-bottom:none}
.eav{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.eif{flex:1}.enm{font-size:13px;font-weight:600}.epn{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}

.msel{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.mb{width:36px;height:36px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--txt2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;font-family:'Outfit',sans-serif}
.mb:hover{border-color:var(--gold);color:var(--gold)}
.ml{font-size:15px;font-weight:600;min-width:160px;text-align:center}

/* Comparison */
.crow{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.cnm{width:80px;font-size:12px;font-weight:500;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cbr{flex:1}.cbbg{width:100%;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:6px}
.cbfl{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.cct{width:40px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;text-align:right;flex-shrink:0}

.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0;z-index:100}
.bnav-in{display:flex;justify-content:space-around;max-width:500px;margin:0 auto}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;background:none;border:none;color:var(--muted);font-family:'Outfit',sans-serif;font-size:10px;cursor:pointer;transition:.2s}
.nbtn .ni{font-size:20px}.nbtn.on{color:var(--gold)}

.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty .ei{font-size:40px;margin-bottom:12px}.empty p{font-size:14px}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--green);color:var(--green);padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;z-index:1000;opacity:0;transition:.3s;pointer-events:none;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;width:100%;max-width:440px;max-height:80vh;overflow-y:auto;animation:fu .3s ease}
.modal h3{font-size:16px;font-weight:700;color:var(--gold);margin-bottom:16px}
.modal-close{float:right;background:none;border:none;color:var(--txt2);font-size:20px;cursor:pointer;padding:4px 8px}

@media(max-width:768px){
  .tabs{display:none}.bnav{display:block}
  .main{padding:16px 14px 90px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .sv{font-size:22px}.hdr{padding:12px 16px}
  .fr{flex-direction:column}
}
</style>
</head>
<body>

<div class="ld-ov" id="loader"><div class="ld-sp"></div><div class="ld-tx">Connecting to cloud...</div></div>
<div class="sync ok" id="sync">● Cloud Synced</div>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div id="modal"></div>

<script>
// ===== FIREBASE =====
firebase.initializeApp({
  apiKey:"AIzaSyAPnA_34R1iuQQUymQ2MftSJuquFJREMu4",
  authDomain:"ascent-editor-tracker.firebaseapp.com",
  projectId:"ascent-editor-tracker",
  storageBucket:"ascent-editor-tracker.firebasestorage.app",
  messagingSenderId:"1044465732037",
  appId:"1:1044465732037:web:855174ba2eb0b843cca3ac"
});
const F=firebase.firestore();
F.enablePersistence({synchronizeTabs:true}).catch(e=>console.log(e.code));

const CL=['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#e84393','#00b894','#6c5ce7'];
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const td=()=>new Date().toISOString().split('T')[0];

let S={scr:'login',me:null,tab:'dashboard',sm:new Date().getMonth(),sy:new Date().getFullYear(),
  cfg:{adminPin:'9999'},eds:[],projects:[],eotm:[],
  ld:{c:0,e:0,p:0,m:0}};

// ===== HELPERS =====
function synk(s){const e=document.getElementById('sync');e.className='sync '+s;e.textContent=s==='ok'?'● Cloud Synced':s==='ing'?'● Syncing...':'● Offline'}
function toast(m,err){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(err?' err':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function dtu(d){if(!d)return 999;const n=new Date();n.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-n)/864e5)}
function fmtd(d){if(!d)return'-';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}

// Points: 10 per export, +5 per on-time, -3 per overdue
function getEdStats(eid,y,m){
  const ps=S.projects.filter(p=>p.editorId===eid);
  let exports=0,onTime=0,overdue=0,points=0;
  ps.forEach(p=>{
    const dl=new Date(p.deadline);
    if(dl.getFullYear()===y&&dl.getMonth()===m){
      if(p.exportDate){exports++;
        if(p.exportDate<=p.deadline)onTime++;else overdue++;
      }else if(dtu(p.deadline)<0)overdue++;
    }
  });
  points=exports*10+onTime*5-overdue*3;
  return{exports,onTime,overdue,points:Math.max(0,points),total:ps.length};
}
function rankings(y,m){return S.eds.map(e=>({...e,...getEdStats(e.id,y,m)})).sort((a,b)=>b.points-a.points)}

// ===== FIRESTORE =====
function listen(){
  F.collection('config').doc('settings').onSnapshot(d=>{if(d.exists)S.cfg=d.data();S.ld.c=1;chk();render()});
  F.collection('editors').orderBy('name').onSnapshot(s=>{S.eds=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.e=1;chk();if(S.me)S.me=S.eds.find(e=>e.id===S.me.id)||S.me;render()});
  F.collection('projects').orderBy('createdDate','desc').onSnapshot(s=>{S.projects=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.p=1;chk();render()});
  F.collection('eotm').onSnapshot(s=>{S.eotm=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.m=1;chk();render()});
  window.addEventListener('online',()=>{synk('ing');setTimeout(()=>synk('ok'),1500)});
  window.addEventListener('offline',()=>synk('off'));
}

function rPCard(p,showActions){
  const days=dtu(p.deadline);
  const isOverdue=!p.exportDate&&days<0;
  const isExported=!!p.exportDate;
  let statusBadge='pending',statusText='Pending';
  if(isExported){statusBadge='exported';statusText='Exported'}
  else if(isOverdue){statusBadge='overdue';statusText='Overdue'}
  else if(p.status==='in-progress'){statusBadge='in-progress';statusText='In Progress'}

  let dlText='',dlClass='normal';
  if(isExported){dlText='Exported: '+fmtd(p.exportDate);dlClass='done'}
  else if(days<0){dlText=Math.abs(days)+'d OVERDUE';dlClass='urgent'}
  else if(days===0){dlText='Due TODAY!';dlClass='urgent'}
  else if(days<=2){dlText=days+'d left';dlClass='urgent'}
  else if(days<=5){dlText=days+'d left';dlClass='normal'}
  else{dlText=days+'d left';dlClass='safe'}

  const chars=p.characters||[];
  const pendingVO=chars.filter(c=>!c.voiceover);

  return `<div class="pcard ${isOverdue?'overdue-blink':''}">
    <div class="pcard-hdr">
      <div class="pcard-title">${p.title}</div>
      <span class="pcard-badge ${statusBadge}">${statusText}</span>
    </div>
    <div class="pcard-meta">
      <span>Deadline: <b>${fmtd(p.deadline)}</b></span>
      <span class="dl-tag ${dlClass}">${dlText}</span>
      ${isExported&&p.exportDate>p.deadline?'<span class="dl-tag urgent">Late delivery</span>':''}
    </div>
    ${chars.length?`<div class="chars-area">
      <div class="chars-label">Characters & Voiceover Status</div>
      <div class="chips">${chars.map((c,i)=>`<span class="chip ${c.voiceover?'vo-yes':'vo-no'}" data-pid="${p.id}" data-ci="${i}"><span class="dot"></span>${c.name} ${c.voiceover?'✓ VO Done':'✗ VO Pending'}</span>`).join('')}</div>
    </div>`:''}
    ${pendingVO.length&&!isExported?`<div class="vo-pending">🎙️ <b>${pendingVO.length} voiceover pending:</b> ${pendingVO.map(c=>c.name).join(', ')}</div>`:''}
    ${showActions&&!isExported?`<div class="pcard-actions">
      <button class="abtn abtn-green" data-export="${p.id}">📦 Mark Exported</button>
      ${p.status!=='in-progress'?`<button class="abtn abtn-blue" data-progress="${p.id}">▶ Start Working</button>`:''}
    </div>`:''}
  </div>`;
}

    if(!title||!dl){toast('❌ Title & deadline required',1);return}
    // Parse characters, preserve existing voiceover status

    const newChars=newNames.map(name=>{const existing=oldChars.find(c=>c.name.toLowerCase()===name.toLowerCase());return{name,voiceover:existing?existing.voiceover:false}});

    document.getElementById('modal').innerHTML='';
    toast('✅ Project updated!');

// ===== EVENTS =====
function sMain(){
  document.getElementById('outBtn')?.addEventListener('click',()=>{S.scr='login';S.me=null;S.tab='dashboard';render()});
  document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.t;render()}));
  document.getElementById('pm')?.addEventListener('click',()=>{S.sm--;if(S.sm<0){S.sm=11;S.sy--}render()});
  document.getElementById('nm')?.addEventListener('click',()=>{S.sm++;if(S.sm>11){S.sm=0;S.sy++}render()});

  // Toggle voiceover (both editor & admin can toggle)
  document.querySelectorAll('[data-pid][data-ci]').forEach(chip=>{
    chip.addEventListener('click',async()=>{
      const pid=chip.dataset.pid,ci=parseInt(chip.dataset.ci);
      const p=S.projects.find(x=>x.id===pid);if(!p)return;
      const chars=[...(p.characters||[])];
      if(chars[ci])chars[ci]={...chars[ci],voiceover:!chars[ci].voiceover};
      await wUpdateProject(pid,{characters:chars});
      toast(chars[ci].voiceover?'✅ '+chars[ci].name+' VO done':'🎙️ '+chars[ci].name+' VO pending');
    });
  });

  // Export buttons (editor)
  document.querySelectorAll('[data-export]').forEach(b=>b.addEventListener('click',()=>showExportModal(b.dataset.export)));

  // Start working
  document.querySelectorAll('[data-progress]').forEach(b=>b.addEventListener('click',async()=>{
    await wUpdateProject(b.dataset.progress,{status:'in-progress'});toast('▶ Started working!');
  }));

  // Admin: export done
  document.querySelectorAll('[data-adminexport]').forEach(b=>b.addEventListener('click',()=>showExportModal(b.dataset.adminexport)));

  // Admin: edit project
  document.querySelectorAll('[data-editproj]').forEach(b=>b.addEventListener('click',()=>showEditModal(b.dataset.editproj)));

  // Admin: delete project
  document.querySelectorAll('[data-delproj]').forEach(b=>b.addEventListener('click',async()=>{
    if(!confirm('Delete this project?'))return;
    synk('ing');await F.collection('projects').doc(b.dataset.delproj).delete();synk('ok');toast('Deleted');
  }));

  // Admin: assign project
  document.getElementById('apBtn')?.addEventListener('click',async()=>{
    const eid=document.getElementById('pe').value,t=document.getElementById('pt').value.trim();
    const charsStr=document.getElementById('pc').value,dl=document.getElementById('pdl').value;
    if(!eid||!t||!dl){toast('❌ Editor, title & deadline fill koro',1);return}
    const chars=charsStr.split(',').map(s=>s.trim()).filter(Boolean).map(name=>({name,voiceover:false}));
    await wAddProject({editorId:eid,title:t,characters:chars,deadline:dl});
    document.getElementById('pt').value='';document.getElementById('pc').value='';
    toast('✅ Project assigned!');
  });

  // Admin: add editor
  document.getElementById('aeBtn')?.addEventListener('click',async()=>{
    const n=document.getElementById('aen').value.trim(),p=document.getElementById('aep').value.trim();
    if(!n||p.length!==4){toast('❌ Name & 4-digit PIN dao',1);return}
    if(S.eds.find(e=>e.pin===p)){toast('❌ PIN already taken',1);return}
    await wAddEd(n,p,CL[S.eds.length%CL.length]);toast('✅ '+n+' added!');
  });

  // Admin: EOTM
  document.getElementById('eoBtn')?.addEventListener('click',async()=>{
    const m=parseInt(document.getElementById('eom').value),y=new Date().getFullYear();
    let eid=document.getElementById('eoe').value;
    if(!eid){const r=rankings(y,m);if(!r.length||r[0].points===0){toast('❌ No points yet',1);return}eid=r[0].id}
    const p=getEdStats(eid,y,m).points;await wEotm(eid,y,m,p);
    toast('🏆 '+S.eds.find(e=>e.id===eid)?.name+' is EOTM!');
  });

  // Admin: remove editor
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{
    if(!confirm('Remove this editor?'))return;await wDelEd(b.dataset.del);toast('Removed');
  }));
}

// ===== INIT =====
(async()=>{
  const d=await F.collection('config').doc('settings').get();
  if(!d.exists)await F.collection('config').doc('settings').set({adminPin:'9999'});
  listen();
})();
</script>
</body>
</html>
