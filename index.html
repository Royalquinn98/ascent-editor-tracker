<div class="ld-ov" id="loader"><div class="ld-sp"></div><div class="ld-tx">Connecting to cloud...</div></div>

<div id="app"></div>

<script>
firebase.initializeApp({apiKey:"AIzaSyAPnA_34R1iuQQUymQ2MftSJuquFJREMu4",authDomain:"ascent-editor-tracker.firebaseapp.com",projectId:"ascent-editor-tracker",storageBucket:"ascent-editor-tracker.firebasestorage.app",messagingSenderId:"1044465732037",appId:"1:1044465732037:web:855174ba2eb0b843cca3ac"});
const F=firebase.firestore();F.enablePersistence({synchronizeTabs:true}).catch(e=>console.log(e.code));
const CL=['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#e84393','#00b894','#6c5ce7'],MO=['January','February','March','April','May','June','July','August','September','October','November','December'],td=()=>new Date().toISOString().split('T')[0];
let S={scr:'login',me:null,tab:'dashboard',sm:new Date().getMonth(),sy:new Date().getFullYear(),cfg:{adminPin:'9999',managerPin:''},eds:[],projects:[],eotm:[],chars:[],penalties:[],ld:{c:0,e:0,p:0,m:0,s:0,n:0},queue:[]};
function sy(s){const e=document.getElementById('sync');e.className='sync '+s;e.textContent=s==='ok'?'● Cloud Synced':s==='ing'?'● Syncing...':'● Offline'}
function toast(m,er){const t=document.getElementById('toast');t.textContent=m;t.className='toast'+(er?' err':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800)}
function ini(n){return(n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function dtu(d){if(!d)return 999;const n=new Date();n.setHours(0,0,0,0);const x=new Date(d);x.setHours(0,0,0,0);return Math.ceil((x-n)/864e5)}
function isOD(deadline){if(!deadline)return false;const now=new Date(),dl=new Date(deadline);dl.setHours(20,0,0,0);return now>dl}
function fmd(d){if(!d)return'-';const p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function gst(eid,y,m){const ps=S.projects.filter(p=>p.editorId===eid);let ex=0,ot=0,ov=0;ps.forEach(p=>{const dl=new Date(p.deadline);if(dl.getFullYear()===y&&dl.getMonth()===m){if(p.exportDate){ex++;if(p.exportDate<=p.deadline)ot++;else ov++}else if(isOD(p.deadline))ov++}});const pen=S.penalties.filter(p=>p.editorId===eid&&p.year===y&&p.month===m).reduce((s,p)=>s+(p.amount||0),0);return{exports:ex,onTime:ot,overdue:ov,penalty:pen,points:Math.max(0,ex*10+ot*5-ov*3-pen)}}
function rnk(y,m){return S.eds.map(e=>({...e,...gst(e.id,y,m)})).sort((a,b)=>b.points-a.points)}
// LISTENERS
function listen(){
F.collection('config').doc('settings').onSnapshot(d=>{if(d.exists)S.cfg=d.data();S.ld.c=1;chk();render()});
F.collection('editors').orderBy('name').onSnapshot(s=>{S.eds=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.e=1;chk();if(S.me)S.me=S.eds.find(e=>e.id===S.me.id)||S.me;render()});
F.collection('projects').orderBy('createdDate','desc').onSnapshot(s=>{S.projects=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.p=1;chk();render()});
F.collection('eotm').onSnapshot(s=>{S.eotm=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.m=1;chk();render()});
F.collection('savedChars').orderBy('name').onSnapshot(s=>{S.chars=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.s=1;chk();render()});
F.collection('penalties').onSnapshot(s=>{S.penalties=s.docs.map(d=>({id:d.id,...d.data()}));S.ld.n=1;chk();render()});
window.addEventListener('online',()=>{sy('ing');setTimeout(()=>sy('ok'),1500)});window.addEventListener('offline',()=>sy('off'));
}
function chk(){if(S.ld.c&&S.ld.e&&S.ld.p&&S.ld.m&&S.ld.s&&S.ld.n)document.getElementById('loader').classList.add('hid')}
// WRITES
async function wAE(n,p,c){sy('ing');await F.collection('editors').add({name:n,pin:p,color:c,joinDate:td()});sy('ok')}
async function wDE(id){sy('ing');const b=F.batch();b.delete(F.collection('editors').doc(id));(await F.collection('projects').where('editorId','==',id).get()).forEach(d=>b.delete(d.ref));await b.commit();sy('ok')}
async function wAP(d){sy('ing');await F.collection('projects').add({...d,createdDate:td(),exportDate:null,status:'pending'});sy('ok')}
async function wUP(id,d){sy('ing');await F.collection('projects').doc(id).update(d);sy('ok')}

function rADM(){const cl=S.chars.map(c=>'<div class="cdi" data-pick="'+c.name+'">'+c.name+'<button class="cdx" data-dc="'+c.id+'">✕</button></div>').join('');
return '<div class="asec"><h3>📋 Assign Projects (Batch)</h3><div class="fr"><select class="fi" id="pe"><option value="">Select editor</option>'+S.eds.map(e=>'<option value="'+e.id+'">'+e.name+'</option>').join('')+'</select></div><div class="fr"><input class="fi" id="pt" placeholder="Project title"><input class="fi" id="pdl" type="date" style="max-width:170px"></div><div class="fr csg"><input class="fi fi-full" id="pch" placeholder="Characters — type or pick saved" autocomplete="off"><div class="cdd" id="cDD">'+cl+'</div></div><div class="fh">Comma diye characters alag koro. Type korle saved names dropdown e ashbe.</div><div class="fr"><button class="btn bg" id="addQ">➕ Add to Queue</button></div><div id="qA">'+S.queue.map((q,i)=>'<div class="qi"><div class="qi-i"><div class="qi-t">'+q.title+'</div><div class="qi-m">DL: '+fmd(q.deadline)+' · '+q.characters.map(c=>c.name).join(', ')+'</div></div><button class="qi-d" data-rq="'+i+'">✕</button></div>').join('')+'</div>'+(S.queue.length?'<div class="fr" style="margin-top:6px"><button class="btn bg" id="assignAll" style="width:100%">🚀 Assign All '+S.queue.length+' Projects</button></div>':'')+'</div><div class="asec"><h3>🎭 Saved Characters</h3><div class="fh">Ei names assign korar somoy dropdown e dekhabe.</div><div class="fr"><input class="fi" id="nch" placeholder="New character name"><button class="btn bg" id="svCh">Save</button></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">'+S.chars.map(c=>'<span class="chip vy" style="cursor:default">'+c.name+'<button class="cdx" data-dc="'+c.id+'" style="margin-left:4px">✕</button></span>').join('')+'</div></div><div class="asec"><h3>➕ Add Editor</h3><div class="fr"><input class="fi" id="aen" placeholder="Name"><input class="fi" id="aep" placeholder="4-digit PIN" maxlength="4" style="max-width:120px"><button class="btn bg" id="aeB">Add</button></div></div><div class="asec"><h3>🏆 Editor of the Month</h3><div class="fr"><select class="fi" id="eom">'+MO.map((m,i)=>'<option value="'+i+'"'+(i===new Date().getMonth()?' selected':'')+'>'+m+'</option>').join('')+'</select><select class="fi" id="eoe"><option value="">Auto</option>'+S.eds.map(e=>'<option value="'+e.id+'">'+e.name+'</option>').join('')+'</select><button class="btn bg" id="eoB">Declare</button></div></div><div class="asec"><h3>👥 Editors</h3>'+S.eds.map(e=>'<div class="el"><div class="eav" style="background:'+e.color+'22;color:'+e.color+'">'+ini(e.name)+'</div><div class="eif"><div class="enm">'+e.name+'</div><div class="epn">PIN: '+e.pin+'</div></div><button class="br" data-del="'+e.id+'" style="padding:5px 12px;font-size:11px;border-radius:8px;cursor:pointer">Remove</button></div>').join('')+'</div><div class="asec"><h3>⚠️ Quality Penalty (Deduct Points)</h3><div class="fr"><select class="fi" id="penEd"><option value="">Select editor</option>'+S.eds.map(e=>'<option value="'+e.id+'">'+e.name+'</option>').join('')+'</select><input class="fi" id="penAmt" type="number" placeholder="Points to deduct" min="1" style="max-width:140px"><input class="fi" id="penRsn" placeholder="Reason (e.g. bad audio sync)"></div><div class="fr"><button class="btn bg" id="penBtn">Deduct Points</button></div>'+(S.penalties.length?'<div style="margin-top:10px;font-size:11px;color:var(--txt2)"><b>Recent penalties:</b></div>'+S.penalties.slice(0,10).map(p=>{const ed=S.eds.find(e=>e.id===p.editorId);return '<div class="el" style="padding:8px 0"><div style="flex:1;font-size:12px"><b style="color:var(--red)">-'+p.amount+'pts</b> '+( ed?.name||'?')+' — '+(p.reason||'No reason')+' <span style="color:var(--muted)">('+fmd(p.date)+')</span></div><button class="cdx" data-delpen="'+p.id+'">✕</button></div>'}).join(''):'')+'</div><div class="asec"><h3>👔 Manager PIN</h3><div class="fh">Manager can view everything but cannot edit. Leave empty to disable.</div><div class="fr"><input class="fi" id="mgPin" placeholder="4-digit Manager PIN" maxlength="4" value="'+(S.cfg.managerPin||'')+'"><button class="btn bg" id="mgPinBtn">Save</button></div></div><div class="asec"><h3>🔒 Change Admin PIN</h3><div class="fr"><input class="fi" id="oldPin" type="password" placeholder="Current PIN" maxlength="4" style="max-width:130px"><input class="fi" id="newPin" type="password" placeholder="New PIN" maxlength="4" style="max-width:130px"><input class="fi" id="cfmPin" type="password" placeholder="Confirm New PIN" maxlength="4" style="max-width:130px"><button class="btn bg" id="chPinB">Change PIN</button></div></div>'}
// MODALS
function mExp(pid){const p=S.projects.find(x=>x.id===pid);if(!p)return;if(p.exportDate){toast('Already exported '+fmd(p.exportDate),1);return}document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">✕</button><h3>📦 Export Done</h3><p style="font-size:13px;color:var(--txt2);margin-bottom:16px">'+p.title+'</p><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Export date:</label></div><div class="fr"><input class="fi" id="exD" type="date" value="'+td()+'"><button class="btn bg" id="exS">Save</button></div></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML='';document.getElementById('exS').onclick=async()=>{const dt=document.getElementById('exD').value;if(!dt){toast('❌ Date dao',1);return}await wUP(pid,{exportDate:dt,status:'exported'});document.getElementById('modal').innerHTML='';toast('✅ Exported!')}}
function mEdit(pid){const p=S.projects.find(x=>x.id===pid);if(!p)return;const ch=p.characters||[];document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">✕</button><h3>✏️ Edit Project</h3><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Title:</label></div><div class="fr"><input class="fi fi-full" id="eT" value="'+p.title+'"></div><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Deadline:</label></div><div class="fr"><input class="fi" id="eDl" type="date" value="'+p.deadline+'"></div><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Characters:</label></div><div class="fr"><input class="fi fi-full" id="eCh" value="'+ch.map(c=>c.name).join(', ')+'"></div><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Export Date (blank=not exported):</label></div><div class="fr"><input class="fi" id="eEx" type="date" value="'+(p.exportDate||'')+'"><button class="btn bo" id="eCl" style="padding:8px 12px;font-size:11px">Clear</button></div><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Editor:</label></div><div class="fr"><select class="fi" id="eEd">'+S.eds.map(e=>'<option value="'+e.id+'"'+(e.id===p.editorId?' selected':'')+'>'+e.name+'</option>').join('')+'</select></div><div class="fr"><label style="font-size:12px;color:var(--txt2);width:100%">Status:</label></div><div class="fr"><select class="fi" id="eSt"><option value="pending"'+(p.status==='pending'?' selected':'')+'>Pending</option><option value="in-progress"'+(p.status==='in-progress'?' selected':'')+'>In Progress</option><option value="exported"'+(p.status==='exported'?' selected':'')+'>Exported</option></select></div><div class="fr" style="margin-top:10px"><button class="btn bg" id="eSv" style="width:100%">Save</button></div></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML='';document.getElementById('eCl').onclick=()=>{document.getElementById('eEx').value=''};document.getElementById('eSv').onclick=async()=>{const t=document.getElementById('eT').value.trim(),dl=document.getElementById('eDl').value,cs=document.getElementById('eCh').value,ex=document.getElementById('eEx').value||null,ed=document.getElementById('eEd').value,st=document.getElementById('eSt').value;if(!t||!dl){toast('❌ Title & deadline required',1);return}const oc=p.characters||[],nn=cs.split(',').map(s=>s.trim()).filter(Boolean),nc=nn.map(name=>{const e=oc.find(c=>c.name.toLowerCase()===name.toLowerCase());return{name,voiceover:e?e.voiceover:false}});await wUP(pid,{title:t,deadline:dl,characters:nc,exportDate:ex,editorId:ed,status:ex?'exported':st});document.getElementById('modal').innerHTML='';toast('✅ Updated!')}}
// EVENTS
function sM(){
document.getElementById('outBtn')?.addEventListener('click',()=>{S.scr='login';S.me=null;S.tab='dashboard';render()});
document.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>{S.tab=b.dataset.t;render()}));
document.getElementById('pm')?.addEventListener('click',()=>{S.sm--;if(S.sm<0){S.sm=11;S.sy--}render()});
document.getElementById('nm')?.addEventListener('click',()=>{S.sm++;if(S.sm>11){S.sm=0;S.sy++}render()});
// VO TOGGLE — both admin & editor
document.querySelectorAll('[data-vo]').forEach(c=>{c.addEventListener('click',async()=>{const pid=c.dataset.vo,ci=+c.dataset.ci,p=S.projects.find(x=>x.id===pid);if(!p)return;const ch=(p.characters||[]).map((x,i)=>i===ci?{...x,voiceover:!x.voiceover}:x);await wUP(pid,{characters:ch});toast(ch[ci].voiceover?'✅ '+ch[ci].name+' VO done':'🎙️ '+ch[ci].name+' VO pending')})});
// Export
document.querySelectorAll('[data-exp]').forEach(b=>b.addEventListener('click',()=>mExp(b.dataset.exp)));
// Undo export
document.querySelectorAll('[data-unexp]').forEach(b=>b.addEventListener('click',async()=>{if(!confirm('Undo export?'))return;await wUP(b.dataset.unexp,{exportDate:null,status:'in-progress'});toast('↩ Undone')}));
// Start
document.querySelectorAll('[data-prog]').forEach(b=>b.addEventListener('click',async()=>{await wUP(b.dataset.prog,{status:'in-progress'});toast('▶ Started!')}));
// Edit
document.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>mEdit(b.dataset.edit)));
// Delete project
document.querySelectorAll('[data-delp]').forEach(b=>b.addEventListener('click',async()=>{if(!confirm('Delete?'))return;await wDP(b.dataset.delp);toast('Deleted')}));
// Char dropdown
const pci=document.getElementById('pch'),cdd=document.getElementById('cDD');
if(pci&&cdd){pci.addEventListener('focus',()=>{if(S.chars.length)cdd.classList.add('show')});pci.addEventListener('input',()=>{const v=pci.value.split(',').pop().trim().toLowerCase();let any=false;cdd.querySelectorAll('[data-pick]').forEach(it=>{const s=it.dataset.pick.toLowerCase().includes(v);it.style.display=s?'flex':'none';if(s)any=true});if(any)cdd.classList.add('show');else cdd.classList.remove('show')});document.addEventListener('click',e=>{if(!e.target.closest('.csg'))cdd.classList.remove('show')});cdd.querySelectorAll('[data-pick]').forEach(it=>{it.addEventListener('click',e=>{if(e.target.dataset.dc)return;const ps=pci.value.split(',').map(s=>s.trim()).filter(Boolean);if(!ps.includes(it.dataset.pick))ps.push(it.dataset.pick);pci.value=ps.join(', ')+', ';pci.focus()})})}
// Del saved char
document.querySelectorAll('[data-dc]').forEach(b=>b.addEventListener('click',async e=>{e.stopPropagation();if(!confirm('Delete from saved?'))return;await wDC(b.dataset.dc);toast('Removed')}));
// Add to queue
document.getElementById('addQ')?.addEventListener('click',()=>{const t=document.getElementById('pt').value.trim(),dl=document.getElementById('pdl').value,cs=document.getElementById('pch').value;if(!t||!dl){toast('❌ Title & deadline',1);return}const ch=cs.split(',').map(s=>s.trim()).filter(Boolean).map(n=>({name:n,voiceover:false}));ch.forEach(c=>wSC(c.name));S.queue.push({title:t,deadline:dl,characters:ch});document.getElementById('pt').value='';document.getElementById('pch').value='';render();toast('➕ Added')});
// Remove from queue
document.querySelectorAll('[data-rq]').forEach(b=>b.addEventListener('click',()=>{S.queue.splice(+b.dataset.rq,1);render()}));
// Assign all
document.getElementById('assignAll')?.addEventListener('click',async()=>{const eid=document.getElementById('pe')?.value;if(!eid){toast('❌ Editor select koro!',1);return}if(!S.queue.length)return;sy('ing');for(const q of S.queue)await F.collection('projects').add({editorId:eid,title:q.title,characters:q.characters,deadline:q.deadline,createdDate:td(),exportDate:null,status:'pending'});sy('ok');const c=S.queue.length;S.queue=[];render();toast('🚀 '+c+' projects assigned!')});
// Save char
document.getElementById('svCh')?.addEventListener('click',async()=>{const n=document.getElementById('nch').value.trim();if(!n){toast('❌ Name',1);return}await wSC(n);document.getElementById('nch').value='';toast('✅ Saved')});
// Add editor
document.getElementById('aeB')?.addEventListener('click',async()=>{const n=document.getElementById('aen').value.trim(),p=document.getElementById('aep').value.trim();if(!n||p.length!==4){toast('❌ Name & PIN',1);return}if(S.eds.find(e=>e.pin===p)){toast('❌ PIN taken',1);return}await wAE(n,p,CL[S.eds.length%CL.length]);toast('✅ '+n+' added!')});
// EOTM
document.getElementById('eoB')?.addEventListener('click',async()=>{const m=+document.getElementById('eom').value,y=new Date().getFullYear();let eid=document.getElementById('eoe').value;if(!eid){const r=rnk(y,m);if(!r.length||r[0].points===0){toast('❌ No points',1);return}eid=r[0].id}const p=gst(eid,y,m).points;await wEO(eid,y,m,p);toast('🏆 EOTM declared!')});
// Del editor
document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',async()=>{if(!confirm('Remove?'))return;await wDE(b.dataset.del);toast('Removed')}));
// Change admin PIN
document.getElementById('chPinB')?.addEventListener('click',async()=>{const o=document.getElementById('oldPin').value,n=document.getElementById('newPin').value,c=document.getElementById('cfmPin').value;if(o!==S.cfg.adminPin){toast('❌ Current PIN bhul hoyeche',1);return}if(n.length!==4){toast('❌ New PIN must be 4 digits',1);return}if(n!==c){toast('❌ New PIN match korchhe na',1);return}if(S.eds.find(e=>e.pin===n)){toast('❌ Ei PIN akjon editor er — alag PIN dao',1);return}sy('ing');await F.collection('config').doc('settings').update({adminPin:n});sy('ok');document.getElementById('oldPin').value='';document.getElementById('newPin').value='';document.getElementById('cfmPin').value='';toast('✅ Admin PIN changed!')});
// Quality penalty — manage page
document.getElementById('penBtn')?.addEventListener('click',async()=>{const eid=document.getElementById('penEd').value,amt=parseInt(document.getElementById('penAmt').value),rsn=document.getElementById('penRsn').value.trim();if(!eid||!amt||amt<1){toast('❌ Editor & points dao',1);return}const n=new Date();await wAddPenalty(eid,n.getFullYear(),n.getMonth(),amt,rsn);document.getElementById('penAmt').value='';document.getElementById('penRsn').value='';toast('⚠️ -'+amt+' pts deducted!')});
// Quality penalty — dashboard (admin + manager both)
document.getElementById('dPenBtn')?.addEventListener('click',async()=>{const eid=document.getElementById('dPenEd').value,amt=parseInt(document.getElementById('dPenAmt').value),rsn=document.getElementById('dPenRsn').value.trim();if(!eid||!amt||amt<1){toast('❌ Editor & points dao',1);return}const n=new Date();await wAddPenalty(eid,n.getFullYear(),n.getMonth(),amt,rsn);document.getElementById('dPenAmt').value='';document.getElementById('dPenRsn').value='';toast('⚠️ -'+amt+' pts deducted!')});
// Delete penalty
document.querySelectorAll('[data-delpen]').forEach(b=>b.addEventListener('click',async()=>{if(!confirm('Remove this penalty?'))return;await wDelPenalty(b.dataset.delpen);toast('Penalty removed')}));
// Manager PIN
document.getElementById('mgPinBtn')?.addEventListener('click',async()=>{const p=document.getElementById('mgPin').value.trim();if(p&&p.length!==4){toast('❌ 4 digits or empty',1);return}if(p&&p===S.cfg.adminPin){toast('❌ Admin PIN er sathe same hobe na',1);return}if(p&&S.eds.find(e=>e.pin===p)){toast('❌ Editor PIN er sathe same',1);return}sy('ing');await F.collection('config').doc('settings').update({managerPin:p||''});sy('ok');toast(p?'✅ Manager PIN set!':'✅ Manager PIN removed')});
}
// INIT
(async()=>{const d=await F.collection('config').doc('settings').get();if(!d.exists)await F.collection('config').doc('settings').set({adminPin:'9999',managerPin:''});else if(!d.data().managerPin&&d.data().managerPin!=='')await F.collection('config').doc('settings').update({managerPin:''});listen()})();
</script>
</body>
