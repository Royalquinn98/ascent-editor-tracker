/* ===== CONFETTI GENERATOR ===== */
function genConfetti(count){const colors=['#f0b429','#f87171','#4da6ff','#34d399','#a78bfa','#fb923c','#22d3ee','#e84393'];let h='';for(let i=0;i<count;i++){const c=colors[Math.floor(Math.random()*colors.length)];const left=Math.random()*100;const delay=Math.random()*4;const dur=2+Math.random()*3;const size=5+Math.random()*8;const shape=Math.random()>0.5?'50%':'2px';h+='<div class="confetti-piece" style="left:'+left+'%;top:-10px;width:'+size+'px;height:'+size+'px;background:'+c+';border-radius:'+shape+';animation-delay:'+delay+'s;animation-duration:'+dur+'s"></div>'}return h}

/* ===== CELEBRATION BANNERS (both awards, all roles, 7 days, with confetti) ===== */

if(eo){const diff=(now-new Date(eo.declaredDate))/864e5;if(diff<=7){const ed=S.eds.find(e=>e.id===eo.editorId);if(ed)h+='<div class="celeb">'+genConfetti(30)+'<div class="celeb-em" style="position:relative;z-index:1">\ud83c\udf89\ud83c\udfc6\ud83c\udf1f\u2728\ud83c\udf8a</div><div style="font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin:10px 0 6px;position:relative;z-index:1">\ud83e\udd47 Editor of the Month \ud83e\udd47</div><div class="celeb-nm" style="position:relative;z-index:1">'+ed.name+'</div><div style="font-size:13px;color:var(--txt2);margin-top:6px;position:relative;z-index:1">'+MO[pv.getMonth()]+' '+pv.getFullYear()+' \u00b7 '+eo.points+' pts</div><div class="celeb-em" style="margin-top:8px;position:relative;z-index:1">\ud83c\udf38\ud83d\udc90\ud83c\udf89\ud83e\udd73\ud83c\udf3a\ud83d\udcab\ud83c\udf8a\ud83c\udf37</div></div>'}}
const le=S.leastErr.find(e=>e.year===pv.getFullYear()&&e.month===pv.getMonth()&&e.declaredDate);
if(le){const diff=(now-new Date(le.declaredDate))/864e5;if(diff<=7){const ed=S.eds.find(e=>e.id===le.editorId);if(ed)h+='<div class="celeb" style="border-color:rgba(34,211,238,.4);background:linear-gradient(135deg,rgba(34,211,238,.1),rgba(52,211,153,.05))">'+genConfetti(30)+'<div class="celeb-em" style="position:relative;z-index:1">\ud83d\udee1\ufe0f\u2728\ud83d\udc8e\u2b50\ud83c\udf1f</div><div style="font-size:11px;color:var(--cyan);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin:10px 0 6px;position:relative;z-index:1">\ud83d\udee1\ufe0f Least Error Editor \ud83d\udee1\ufe0f</div><div class="celeb-nm" style="background:linear-gradient(90deg,var(--cyan),var(--green),var(--cyan));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1">'+ed.name+'</div><div style="font-size:13px;color:var(--txt2);margin-top:6px;position:relative;z-index:1">'+MO[pv.getMonth()]+' '+pv.getFullYear()+'</div><div class="celeb-em" style="margin-top:8px;position:relative;z-index:1">\ud83d\udc90\ud83c\udf3a\u2728\ud83c\udf8a\ud83d\udcab\ud83c\udf37</div></div>'}}
return h}catch(e){return ''}}

 class="empty"><div class="ei">\ud83c\udf89</div><p>All done!</p></div>')+'</div>'}

/* ===== RANKINGS (full form names for awards) ===== */
function rRK(hl){const r=rnk(S.sy,S.sm),mxp=Math.max(...r.map(e=>e.points),1),mxe=Math.max(...r.map(e=>e.exports),1);const n=new Date(),curY=n.getFullYear(),curM=n.getMonth();const eo=S.eotm.find(e=>e.year===S.sy&&e.month===S.sm);let eh='';if(eo){const ed=S.eds.find(e=>e.id===eo.editorId);if(ed)eh='<div class="eotm"><div style="font-size:44px;margin-bottom:6px">\ud83c\udfc6</div><div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:4px">Editor of the Month</div><div style="font-size:24px;font-weight:800">'+ed.name+'</div><div style="font-size:12px;color:var(--txt2)">'+eo.points+' pts</div></div>'}else if(r.length&&r[0].points>0){const tp=r[0].points,tops=r.filter(e=>e.points===tp);eh='<div class="eotm"><div style="font-size:44px;margin-bottom:6px">\ud83c\udfc6</div><div style="font-size:10px;color:var(--gold);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:4px">'+(tops.length>1?'Tied':'Leading')+'</div><div style="font-size:24px;font-weight:800">'+tops.map(e=>e.name).join(' & ')+'</div><div style="font-size:12px;color:var(--txt2)">'+tp+' pts</div></div>'}
const eotmPrize=getPrize('eotm',S.sy,S.sm);const leePrize=getPrize('lee',S.sy,S.sm);
const prizeCards=[];if(eotmPrize)prizeCards.push('<div style="text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Editor of the Month Prize</div><div style="font-size:18px;font-weight:800;color:var(--gold)">\u20b9'+eotmPrize+'</div></div>');if(leePrize)prizeCards.push('<div style="text-align:center"><div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Least Error Editor Prize</div><div style="font-size:18px;font-weight:800;color:var(--cyan)">\u20b9'+leePrize+'</div></div>');const prizeBox=prizeCards.length?'<div style="background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:14px;margin-bottom:14px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center">'+prizeCards.join('')+'</div>':'';
return rMS()+prizeBox+eh+'<div class="st">Rankings</div><div class="lb">'+r.map((e,i)=>{let rk=1;for(let j=0;j<i;j++){if(r[j].points>e.points)rk=j+2}const rc=rk<=3?'r'+rk:'',me=e.id===hl;return '<div class="lr '+rc+' '+(me?'hl':'')+'"><div class="rb '+(rk>3?'df':'')+'">'+(rk<=3?['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'][rk-1]:rk)+'</div><div class="la" style="background:'+e.color+'22;color:'+e.color+';border:2px solid '+e.color+'44">'+ini(e.name)+'</div><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">'+getMedal(e.id,S.sy,S.sm)+e.name+(rk===1?' \ud83d\udc51':'')+(me?' <span style="font-size:10px;color:var(--blue)">(You)</span>':'')+'</div><div style="font-size:11px;color:var(--txt2)">'+e.exports+' exports \u00b7 '+e.onTime+' on-time'+(e.overdue?' \u00b7 <span style="color:var(--red)">'+e.overdue+' OD</span>':'')+'</div></div><div style="text-align:right;cursor:pointer" data-pbd="'+e.id+'"><div style="font-family:\'JetBrains Mono\',monospace;font-size:18px;font-weight:700;color:var(--gold)">'+e.points+'</div><div style="font-size:9px;color:var(--muted)">pts \u25be</div></div></div>'}).join('')+'</div><div class="st">Points</div><div style="background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:16px;margin-bottom:14px">'+r.map(e=>'<div class="crow"><div class="cnm">'+e.name+'</div><div style="flex:1"><div class="cbbg"><div class="cbfl" style="width:'+(mxp>0?(e.points/mxp)*100:0)+'%;background:'+e.color+'"></div></div></div><div style="width:36px;text-align:right;font-size:12px;font-weight:600;color:'+e.color+'">'+e.points+'</div></div>').join('')+'</div><div class="st">Exports</div><div style="background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:16px;margin-bottom:20px">'+r.map(e=>'<div class="crow"><div class="cnm">'+e.name+'</div><div style="flex:1"><div class="cbbg"><div class="cbfl" style="width:'+(mxe>0?(e.exports/mxe)*100:0)+'%;background:'+e.color+'"></div></div></div><div style="width:36px;text-align:right;font-size:12px;font-weight:600;color:'+e.color+'">'+e.exports+'</div></div>').join('')+'</div>'}

/* ===== ADMIN/MANAGER DASHBOARD (no star/top scorer box) ===== */

function grp(list,clr,isOv){const be={};list.forEach(p=>{const ed=S.eds.find(e=>e.id===p.editorId);const nm=ed?.name||'?';if(!be[nm])be[nm]={ed,ps:[]};be[nm].ps.push(p)});return Object.keys(be).sort().map(nm=>'<div style="margin:10px 0 6px;font-size:13px;font-weight:700;color:'+clr+';display:flex;align-items:center;gap:8px"><div class="eav" style="width:26px;height:26px;font-size:10px;background:'+(be[nm].ed?.color||'#666')+'22;color:'+(be[nm].ed?.color||'#666')+'">'+ini(nm)+'</div>'+nm+' ('+be[nm].ps.length+')</div><div class="plist">'+be[nm].ps.map(p=>rAPC(p,be[nm].ed,dtu(p.deadline),isOv,false,isMg)).join('')+'</div>').join('')}
function expBT(){const exps=S.projects.filter(p=>p.exportDate).sort((a,b)=>b.exportDate.localeCompare(a.exportDate));const bt={};exps.forEach(p=>{const t=p.type||'Facebook';if(!bt[t])bt[t]=[];bt[t].push(p)});const ord=(S.cfg.projectTypes||[]).map(t=>t.name);Object.keys(bt).forEach(t=>{if(!ord.includes(t))ord.push(t)});return ord.filter(t=>bt[t]).map(t=>{const tp=gTyp(t),it=bt[t];const bd={};it.forEach(p=>{if(!bd[p.exportDate])bd[p.exportDate]=[];bd[p.exportDate].push(p)});return '<div style="margin:14px 0 8px;font-size:13px;font-weight:700;padding:8px 12px;border-radius:10px;background:'+tp.color+'12;color:'+tp.color+';cursor:pointer" data-tgl="1">'+t+' ('+it.length+')</div><div style="display:none">'+Object.keys(bd).sort((a,b)=>b.localeCompare(a)).map(dt=>'<div style="margin:10px 0 4px;font-size:11px;font-weight:600;color:var(--gold)">'+fmd(dt)+'</div><div class="plist">'+bd[dt].map(p=>{const ed=S.eds.find(e=>e.id===p.editorId);return rAPC(p,ed,dtu(p.deadline),false,true,isMg)}).join('')+'</div>').join('')+'</div>'}).join('')}

function mExp(pid){const p=S.projects.find(x=>x.id===pid);if(!p||p.exportDate)return;document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">\u2715</button><h3>Export</h3><p style="font-size:13px;color:var(--txt2);margin-bottom:12px">'+p.title+'</p><div class="fr"><input class="fi" id="exD" type="date" value="'+td()+'"><button class="btn bg" id="exS">Save</button></div></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML='';document.getElementById('exS').onclick=async()=>{const dt=document.getElementById('exD').value;if(!dt)return toast('Date!',1);await wUP(pid,{exportDate:dt,status:'exported'});document.getElementById('modal').innerHTML='';toast('Exported!')}}
function mEdit(pid){const p=S.projects.find(x=>x.id===pid);if(!p)return;const ch=p.characters||[];document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">\u2715</button><h3>Edit</h3><div class="fr"><input class="fi" id="eT" value="'+p.title+'"></div><div class="fr"><input class="fi" id="eDl" type="date" value="'+p.deadline+'"></div><div class="fr"><input class="fi" id="eCh" value="'+ch.map(c=>c.name).join(', ')+'"></div><div class="fr"><input class="fi" id="eEx" type="date" value="'+(p.exportDate||'')+'"><button class="btn bo" id="eCl" style="padding:8px 10px;font-size:11px">Clear</button></div><div class="fr"><select class="fi" id="eEd">'+S.eds.map(e=>'<option value="'+e.id+'"'+(e.id===p.editorId?' selected':'')+'>'+e.name+'</option>').join('')+'</select><select class="fi" id="eTy">'+(S.cfg.projectTypes||[]).map(t=>'<option value="'+t.name+'"'+(t.name===(p.type||'Facebook')?' selected':'')+'>'+t.name+'</option>').join('')+'</select></div><div class="fr"><button class="btn bg" id="eSv" style="width:100%">Save</button></div></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML='';document.getElementById('eCl').onclick=()=>{document.getElementById('eEx').value=''};document.getElementById('eSv').onclick=async()=>{const t=document.getElementById('eT').value.trim(),dl=document.getElementById('eDl').value,cs=document.getElementById('eCh').value,ex=document.getElementById('eEx').value||null,ed=document.getElementById('eEd').value,ty=document.getElementById('eTy').value;if(!t||!dl)return toast('Title & DL!',1);const oc=p.characters||[],nc=cs.split(',').map(s=>s.trim()).filter(Boolean).map(nm=>{const e=oc.find(c=>c.name.toLowerCase()===nm.toLowerCase());return{name:nm,voiceover:e?e.voiceover:false}});await wUP(pid,{title:t,deadline:dl,characters:nc,exportDate:ex,editorId:ed,status:ex?'exported':p.status,type:ty});document.getElementById('modal').innerHTML='';toast('Updated!')}}
function mEditUp(vid){const v=S.fbUps.find(x=>x.id===vid);if(!v)return;document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">\u2715</button><h3>Edit #'+v.videoNum+'</h3><div class="fr"><input class="fi" id="euN" type="number" value="'+v.videoNum+'"><input class="fi" id="euT" value="'+v.title+'"></div><div class="fr"><input class="fi" id="euD" type="date" value="'+(v.uploadDate||'')+'"><button class="btn bo" id="euCl" style="padding:8px 10px;font-size:11px">Clear</button></div><button class="btn bg" id="euS" style="width:100%;margin-top:8px">Save</button></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML='';document.getElementById('euCl').onclick=()=>{document.getElementById('euD').value=''};document.getElementById('euS').onclick=async()=>{const n=+document.getElementById('euN').value,t=document.getElementById('euT').value.trim(),d=document.getElementById('euD').value||null;if(!n||!t)return toast('No & Title!',1);if(S.fbUps.find(x=>x.videoNum===n&&x.id!==vid))return toast('# exists!',1);sy('ing');await F.collection('fbUploads').doc(vid).update({videoNum:n,title:t,uploaded:!!d,uploadDate:d});sy('ok');document.getElementById('modal').innerHTML='';toast('Updated!')}}
function mPBD(eid){const ed=S.eds.find(e=>e.id===eid);if(!ed)return;const y=S.sy,m=S.sm,ps=S.projects.filter(p=>p.editorId===eid);let rows='',tot=0;ps.forEach(p=>{const dl=new Date(p.deadline);if(dl.getFullYear()===y&&dl.getMonth()===m){const tp=gTyp(p.type);if(p.exportDate){const ot=p.exportDate<=p.deadline;const pts=tp.pts+(ot?tp.otBonus:0);rows+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span>\ud83d\udce6 '+p.title+' ('+(p.type||'FB')+')</span><span style="color:var(--green);font-weight:600">+'+pts+'</span></div>';tot+=pts}else if(isOD(p.deadline)){rows+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span>\u23f0 '+p.title+'</span><span style="color:var(--red)">-3</span></div>';tot-=3}}});S.bonuses.filter(b=>b.editorId===eid&&b.year===y&&b.month===m).forEach(b=>{rows+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span>'+(b.btype==='project'?'\ud83d\udccb':'\ud83c\udf81')+' '+(b.reason||'Manual')+'</span><span style="color:var(--green)">+'+b.amount+'</span></div>';tot+=b.amount});S.penalties.filter(p=>p.editorId===eid&&p.year===y&&p.month===m).forEach(p=>{rows+='<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px"><span>\ud83d\udea8 '+(p.reason||'Penalty')+'</span><span style="color:var(--red)">-'+p.amount+'</span></div>';tot-=p.amount});document.getElementById('modal').innerHTML='<div class="mbg"><div class="mdl"><button class="mc" id="mC">\u2715</button><h3>'+ed.name+' \u2014 '+MO[m]+' '+y+'</h3>'+rows+'<div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:14px"><span>Total</span><span style="color:var(--gold)">'+Math.max(0,tot)+'</span></div></div></div>';document.getElementById('mC').onclick=()=>document.getElementById('modal').innerHTML=''}
